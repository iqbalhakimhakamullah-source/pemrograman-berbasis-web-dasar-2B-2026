<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTS LANJUTAN</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="h-screen flex font-aerial">
    <div class="w-1/2 bg-[#5E7AC4] text-white flex flex-col justify-center px-35">
        <h1 class="text-4xl font-bold mb-6 leading-snug">
            Hello Prospective <br> Students
        </h1>
        <img src="gambar_login page.png" alt="illustration" class="w-120 mb-6">
        <p class="text-sm text-gray-200 max-w-md">
            Unlock your professional potential. Learn from industry leaders
            and stay ahead of the competition.
        </p>
    </div>
    <div class="w-1/2 bg-gray-200 flex items-center justify-center">
        <div class="w-[350px]">
            <h2 class="text-center text-lg font-semibold mb-1">
                LOGIN PAGE
            </h2>
            <p class="text-center text-xs text-gray-500 mb-6">
                Masukkan Username dan Password Anda
            </p>
            <form class="space-y-4">

                <div>
                    <input type="email" placeholder="Email Address"
                        class="w-full px-4 py-2 rounded-lg bg-gray-100 text-center border">
                </div>

                <div>
                    <input type="password" placeholder="Password"
                        class="w-full px-4 py-2 rounded-lg bg-gray-100 text-center border">
                </div>

                <button class="w-full bg-[#3F57A6] text-white py-2 rounded-lg">
                    Login
                </button>
            </form>
            </form>
            <div class="flex items-center my-6">
                <div class="flex-grow h-px bg-gray-400"></div>
                <span class="mx-3 text-xs text-gray-500">Or Login With</span>
                <div class="flex-grow h-px bg-gray-400"></div>
            </div>
            <button class="w-full flex items-center justify-center gap-2 bg-white py-2 rounded-lg shadow hover:bg-gray-50 transition">
                <img src="logo ggl.jpeg" class="w-5">
                <span class="text-sm">Sign in with Account Google</span>
            </button>
        </div>
    </div>
</body>

</html>
